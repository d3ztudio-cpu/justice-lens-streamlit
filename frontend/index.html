<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justice Lens</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">⚖️</div>
          <div class="brand-text">
            <div class="name">Justice Lens</div>
            <div class="sub">Cyber legal AI</div>
          </div>
        </div>

        <div class="search">
          <input id="navSearch" type="search" placeholder="Search" />
        </div>

        <nav class="nav">
          <button class="nav-item active" data-view="chat">AI Chat</button>
          <button class="nav-item" data-view="projects">Projects</button>
          <button class="nav-item" data-view="templates">Templates</button>
          <button class="nav-item" data-view="docs">Documents</button>
          <button class="nav-item" data-view="community">Community</button>
          <div class="spacer"></div>
          <button class="nav-item subtle" data-view="settings">Settings</button>
          <button class="nav-item subtle" data-view="help">Help</button>
        </nav>

        <div class="sidebar-footer">
          <div class="toggle">
            <button class="chip active" id="lightBtn">Light</button>
            <button class="chip" id="darkBtn">Dark</button>
          </div>
          <div class="user">
            <div class="avatar">JL</div>
            <div>
              <div class="user-name">Guest</div>
              <div class="user-sub">not signed in</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="title">AI Chat</div>
          <div class="actions">
            <button class="btn ghost" id="clearBtn">Clear</button>
          </div>
        </header>

        <section class="content">
          <div class="welcome" id="welcome">
            <h1>Welcome to Justice Lens</h1>
            <p>Describe a cyber incident or ask for an IT Act section explanation.</p>
            <div class="tiles">
              <button class="tile" data-seed="I was scammed via UPI. What sections apply?">
                <div class="tile-title">Report scam</div>
                <div class="tile-sub">UPI / banking fraud</div>
              </button>
              <button class="tile" data-seed="Explain Section 66F">
                <div class="tile-title">Explain section</div>
                <div class="tile-sub">e.g. 66F, 66E</div>
              </button>
              <button class="tile" data-seed="My account was hacked and my data leaked. What should I do?">
                <div class="tile-title">Account hacked</div>
                <div class="tile-sub">Action plan</div>
              </button>
              <button class="tile" data-seed="Someone posted my private photos without consent. What are the punishments?">
                <div class="tile-title">Privacy violation</div>
                <div class="tile-sub">Punishments & steps</div>
              </button>
            </div>
          </div>

          <div class="chat" id="chat"></div>

          <div class="composer">
            <form id="chatForm" class="composer-inner">
              <textarea id="message" rows="1" placeholder="Message Justice Lens..." required></textarea>
              <button type="submit" class="btn primary" id="sendBtn">Send</button>
            </form>
            <div class="composer-hint">
              Backend: <code id="apiBaseLabel"></code>
            </div>
          </div>
        </section>
      </main>

      <aside class="rightbar">
        <div class="right-head">
          <div class="right-title">Projects</div>
          <button class="btn ghost small">New</button>
        </div>
        <div class="right-list" id="projectList">
          <div class="project active">
            <div class="project-title">Default</div>
            <div class="project-sub">Your chats are stored locally</div>
          </div>
          <div class="project">
            <div class="project-title">IT Act Study</div>
            <div class="project-sub">Section explanations</div>
          </div>
          <div class="project">
            <div class="project-title">Incident Notes</div>
            <div class="project-sub">Victim scenario drafts</div>
          </div>
        </div>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
