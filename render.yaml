services:
  - type: web
    name: justice-lens
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: justice-lens
      - key: SERVE_FRONTEND
        value: "true"
